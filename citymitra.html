<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityMitra - District Portal</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        h1 { color: var(--primary-color); margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus { border-color: var(--accent-color); }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .footer { margin-top: 1.5rem; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1>CityMitra Portal</h1>
    <p>Select a district to launch the InfoBot</p>
    
    <select id="districtSelect">
        <option value="" disabled selected>-- Select District --</option>
        <option value="https://kkr-citymitra.app">Kurukshetra (कुरुक्षेत्र), Haryana</option>
        <option value="https://karnal-citymitra.app">Karnal (करनाल), Haryana</option>
        <option value="https://ambala-citymitra.app">Ambala (अम्बाला), Haryana</option>
        <option value="https://sirsa-citymitra.app">Sirsa (सिरसा), Haryana</option>
        <option value="https://palwal-citymitra.app">Palwal (पलवल), Haryana</option>
        <option value="https://faridabad-citymitra.app">Faridabad (फरीदाबाद), Haryana</option>
        <option value="https://panchkula-citymitra.app">Panchkula (पंचकुला), Haryana</option>
        <option value="https://ranchi-citymitra.app">Ranchi (राँची), Jharkhand</option>
        <option value="https://indore-citymitra.app">Indore (इन्दौर), Madhya Pradesh</option>
        <option value="https://dehradun-citymitra.app">Dehradun (देहरादून), Uttarakhand</option>
        <option value="https://jaipur-citymitra.app">Jaipur (जयपुर), Rajasthan</option>
        <option value="https://amritsar-citymitra.app">Amritsar (अमृतसर), Punjab</option>
        <option value="https://varanasi-citymitra.app">Varanasi (वाराणसी), Uttar Pradesh</option>
    </select>

    <button onclick="openDistrict()">Open CityMitra</button>

    <div class="footer">
        Official District Information Assistant Hub
    </div>
</div>

<script>
    function openDistrict() {
        const select = document.getElementById('districtSelect');
        const url = select.value;
        if (url) {
            window.open(url, '_blank');
        } else {
            alert("Please select a district first.");
        }
    }
</script>

</body>
</html>
