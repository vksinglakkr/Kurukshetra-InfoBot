<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityMitra - Elaborated Source Hub</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f0f2f5;
            --text: #333;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }
        .header { text-align: center; margin-bottom: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
            display: flex;
            flex-direction: column;
            border-top: 5px solid var(--accent);
        }
        .card h2 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        .card .location { color: #666; margin-bottom: 15px; font-weight: 500; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 15px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-main { background: var(--accent); color: white; }
        .btn-outline { background: #eee; color: var(--primary); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Modal / Sidebar for Elaborated Sources */
        #sourceOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center; align-items: center;
        }
        .source-panel {
            background: white;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 15px;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }
        .category-title {
            background: #f8f9fa;
            padding: 8px 12px;
            border-left: 4px solid var(--accent);
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .link-item {
            display: block;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
            word-break: break-all;
        }
        .link-item:hover { text-decoration: underline; }
        .close-icon {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>CityMitra Global Portal</h1>
    <p>Unified access to District Bots and their underlying Government Data Sources</p>
</div>

<div class="grid" id="container"></div>

<!-- Elaborated Source Viewer -->
<div id="sourceOverlay" onclick="closeSources(event)">
    <div class="source-panel" onclick="event.stopPropagation()">
        <span class="close-icon" onclick="document.getElementById('sourceOverlay').style.display='none'">×</span>
        <h2 id="panelTitle">District Sources</h2>
        <div id="sourceContent"></div>
    </div>
</div>

<script>
    // Full Config data reference from citymitra-config (4)_2.json
    const configData = {
        "kkr": {
            meta: { name: "Kurukshetra", hindi: "कुरुक्षेत्र", state: "Haryana", pop: "9,64,655" },
            domain: "https://kkr-citymitra.app",
            sources: {
                "Official Portal": ["https://kurukshetra.gov.in"],
                "Tourism & Heritage": ["https://kkrtour.com", "https://48koskurukshetra.com", "https://haryanatourism.gov.in", "https://mahabharatanubhavkendra.com"],
                "Administration & Directory": ["https://kurukshetra.gov.in/whoswho/", "https://kurukshetra.gov.in/directory/", "https://kurukshetra.gov.in/administrative-setup-kurukshetra/"],
                "Education & Law": ["https://kuk.ac.in", "https://nitkkr.ac.in", "https://kurukshetra.dcourts.gov.in", "https://kurukshetra.haryanapolice.gov.in"]
            }
        },
        "asr": {
            meta: { name: "Amritsar", hindi: "अमृतसर", state: "Punjab", pop: "2,490,656" },
            domain: "https://amritsar-citymitra.app",
            sources: {
                "Official Portal": ["https://amritsar.gov.in"],
                "Tourism": ["https://punjabtourism.punjab.gov.in", "https://amritsar.gov.in/tourist-places/"],
                "Administration": ["https://amritsar.gov.in/whoswho/", "https://amritsar.gov.in/directory/", "https://amritsar.gov.in/political-setup/"],
                "Public Services": ["https://amritsarpolice.gov.in", "https://amritsar.dcourts.gov.in", "https://online.gndu.ac.in"]
            }
        },
        "vns": {
            meta: { name: "Varanasi", hindi: "वाराणसी", state: "Uttar Pradesh", pop: "3,676,841" },
            domain: "https://varanasi-citymitra.app",
            sources: {
                "Official Portal": ["https://varanasi.nic.in"],
                "Tourism": ["https://www.uptourism.gov.in", "https://varanasi.nic.in/tourist-places/"],
                "Administration": ["https://varanasi.nic.in/whoswho/", "https://varanasi.nic.in/directory/", "https://varanasi.nic.in/administrative-setup/"],
                "Utilities": ["https://varanasipolice.gov.in", "https://varanasi.dcourts.gov.in", "https://www.bhu.ac.in"]
            }
        },
        "ddn": {
            meta: { name: "Dehradun", hindi: "देहरादून", state: "Uttarakhand", pop: "1,696,694" },
            domain: "https://dehradun-citymitra.app",
            sources: {
                "Official Portal": ["https://dehradun.gov.in"],
                "Tourism": ["https://uttarakhandtourism.gov.in", "https://dehradun.gov.in/tourist-places/"],
                "Administration": ["https://dehradun.nic.in/about-district/whos-who/", "https://dehradun.gov.in/directory/", "https://dehradun.gov.in/administrative-setup/"],
                "Links": ["https://dehradunpolice.uk.gov.in", "https://dehradun.dcourts.gov.in"]
            }
        }
        // Additional districts follow the same pattern...
    };

    function init() {
        const container = document.getElementById('container');
        Object.entries(configData).forEach(([key, district]) => {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                <h2>${district.meta.name}</h2>
                <div style="font-size: 1.1rem; color: #555;">${district.meta.hindi}</div>
                <div class="location">${district.meta.state} | Pop: ${district.meta.pop}</div>
                <div class="btn-group">
                    <a href="${district.domain}" target="_blank" class="btn btn-main">Open Bot</a>
                    <button onclick="viewSources('${key}')" class="btn btn-outline">All Sources</button>
                </div>
            `;
            container.appendChild(el);
        });
    }

    function viewSources(key) {
        const district = configData[key];
        document.getElementById('panelTitle').innerText = `Data Sources: ${district.meta.name}`;
        const content = document.getElementById('sourceContent');
        content.innerHTML = '';

        Object.entries(district.sources).forEach(([cat, links]) => {
            const catHeader = document.createElement('div');
            catHeader.className = 'category-title';
            catHeader.innerText = cat;
            content.appendChild(catHeader);

            links.forEach(url => {
                const a = document.createElement('a');
                a.className = 'link-item';
                a.href = url;
                a.target = '_blank';
                a.innerText = url;
                content.appendChild(a);
            });
        });

        document.getElementById('sourceOverlay').style.display = 'flex';
    }

    function closeSources(e) {
        if(e.target.id === 'sourceOverlay') {
            document.getElementById('sourceOverlay').style.display = 'none';
        }
    }

    init();
</script>
</body>
</html>
